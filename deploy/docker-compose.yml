# Standalone gcp-relay stack: GCS + Pub/Sub emulators + relay.
#
# Bring it up with the path to your gcp-relay.yaml:
#
#   GCP_RELAY_CONFIG_HOST_PATH=$PWD/gcp-relay.yaml \
#   GCP_RELAY_HOST_ROOT=$PWD \
#     docker compose -f deploy/docker-compose.yml up
#
# The relay self-bootstraps the declared buckets/topics/subscriptions
# (GCP_RELAY_AUTO_BOOTSTRAP=true) AND launches one container per
# source-based function in your config via the mounted docker socket
# (GCP_RELAY_LAUNCH_FUNCTIONS=true). No `gcp-relay` CLI required.
#
# GCP_RELAY_HOST_ROOT is the *host* path of the directory holding your
# gcp-relay.yaml and function source folders. The relay can't infer it
# (it sees only its own filesystem), but the docker daemon creating
# sibling function containers needs host paths to resolve volume mounts.
#
# To attach app services from another compose stack, add to that compose:
#
#   networks:
#     gcp-relay:
#       external: true
#
# Then point your services at gcs.localhost:4443 and pubsub.localhost:8085.

services:
  pubsub:
    image: ${GCP_RELAY_PUBSUB_IMAGE:-ghcr.io/mhmalek/gcp-relay-pubsub:latest}
    ports:
      - "${GCP_RELAY_HOST_PUBSUB_PORT:-8085}:8085"
    networks:
      gcp-relay:
        aliases: [pubsub.localhost]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8085"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s

  gcs:
    image: ${GCP_RELAY_GCS_IMAGE:-fsouza/fake-gcs-server:1.54.0}
    command:
      - "-scheme"
      - "http"
      - "-port"
      - "4443"
      - "-backend"
      - "filesystem"
      - "-filesystem-root"
      - "/storage"
      - "-public-host"
      - "gcs.localhost:4443"
      - "-event.pubsub-project-id"
      - "${GCP_RELAY_PROJECT:-local-project}"
      - "-event.pubsub-topic"
      - "gcs-firehose"
      - "-event.list"
      - "finalize,delete,metadataUpdate,archive"
    environment:
      PUBSUB_EMULATOR_HOST: pubsub:8085
    ports:
      - "${GCP_RELAY_HOST_GCS_PORT:-4443}:4443"
    networks:
      gcp-relay:
        aliases: [gcs.localhost, storage.gcp.localhost]
    depends_on:
      pubsub:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:4443/_internal/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 10

  relay:
    image: ${GCP_RELAY_IMAGE:-ghcr.io/mhmalek/gcp-relay:latest}
    environment:
      GCP_RELAY_CONFIG: /config/gcp-relay.yaml
      GCP_RELAY_PORT: "8099"
      GCP_RELAY_PROJECT: ${GCP_RELAY_PROJECT:-local-project}
      GCP_RELAY_FIREHOSE_TOPIC: gcs-firehose
      GCP_RELAY_PUSH_URL: http://relay:8099
      GCP_RELAY_AUTO_BOOTSTRAP: "true"
      GCP_RELAY_LAUNCH_FUNCTIONS: "true"
      GCP_RELAY_HOST_ROOT: ${GCP_RELAY_HOST_ROOT:?set GCP_RELAY_HOST_ROOT to the host path of your project root}
      PUBSUB_EMULATOR_HOST: pubsub:8085
      STORAGE_EMULATOR_HOST: http://gcs.localhost:4443
    ports:
      - "${GCP_RELAY_HOST_RELAY_PORT:-8099}:8099"
    volumes:
      - ${GCP_RELAY_CONFIG_HOST_PATH:?set GCP_RELAY_CONFIG_HOST_PATH to your gcp-relay.yaml}:/config/gcp-relay.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      gcp-relay:
        aliases: [relay.localhost]
    depends_on:
      pubsub:
        condition: service_healthy
      gcs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8099/health"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  gcp-relay:
    name: gcp-relay
