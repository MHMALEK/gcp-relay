name: publish-images

# Publishes four images to GHCR:
#   ghcr.io/<owner>/gcp-relay                  (the relay binary)
#   ghcr.io/<owner>/gcp-relay-pubsub           (the Pub/Sub emulator container)
#   ghcr.io/<owner>/gcp-relay-runtime-python   (Python Functions Framework runner)
#   ghcr.io/<owner>/gcp-relay-runtime-node     (Node Functions Framework runner)
#
# Tags:
#   - On push to default branch: `:main` + `:sha-<short>`
#   - On git tag matching v*:    `:vX.Y.Z` + `:latest`
on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: gcp-relay
            context: .
            dockerfile: Dockerfile
          - image: gcp-relay-pubsub
            context: docker/pubsub
            dockerfile: docker/pubsub/Dockerfile
          - image: gcp-relay-runtime-python
            context: docker/runtime-python
            dockerfile: docker/runtime-python/Dockerfile
          - image: gcp-relay-runtime-node
            context: docker/runtime-node
            dockerfile: docker/runtime-node/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
