version: v2
project_id: local-project

buckets:
  - name: uploads-bucket

functions:
  - name: python-hello
    runtime: python312
    source: ./functions/python-hello
    entry_point: hello
    trigger:
      event_filters:
        type: google.cloud.storage.object.v1.finalized
        bucket: uploads-bucket

  - name: node-hello
    runtime: nodejs20
    source: ./functions/node-hello
    entry_point: hello
    trigger:
      event_filters:
        type: google.cloud.storage.object.v1.finalized
        bucket: uploads-bucket

  - name: go-hello
    runtime: go122
    source: ./functions/go-hello
    entry_point: hello
    trigger:
      event_filters:
        type: google.cloud.storage.object.v1.finalized
        bucket: uploads-bucket
