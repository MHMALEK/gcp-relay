services:
  pubsub:
    build:
      context: ./docker/pubsub
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8085"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s

  gcs:
    image: fsouza/fake-gcs-server:1.54.0
    command:
      - "-scheme"
      - "http"
      - "-port"
      - "4443"
      - "-backend"
      - "filesystem"
      - "-filesystem-root"
      - "/storage"
      - "-public-host"
      - "gcs:4443"
      - "-event.pubsub-project-id"
      - "local-project"
      - "-event.pubsub-topic"
      - "gcs-notifications"
      - "-event.bucket"
      - "demo-bucket"
      - "-event.list"
      - "finalize"
    environment:
      PUBSUB_EMULATOR_HOST: pubsub:8085
    ports:
      - "4443:4443"
    volumes:
      - ./storage:/storage
    depends_on:
      pubsub:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:4443/_internal/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 10

  echo-function:
    build:
      context: ./examples/echo-function
    ports:
      - "8080:8080"
    environment:
      FUNCTION_TARGET: echo_event
      FUNCTION_SIGNATURE_TYPE: cloudevent

  relay:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8099:8099"
    environment:
      GCP_RELAY_CONFIG: /config/triggers.example.yaml
      GCP_RELAY_PORT: "8099"
      PUBSUB_EMULATOR_HOST: pubsub:8085
      STORAGE_EMULATOR_HOST: http://gcs:4443
    volumes:
      - ./config/triggers.example.yaml:/config/triggers.example.yaml:ro
    depends_on:
      pubsub:
        condition: service_healthy
      gcs:
        condition: service_healthy
      echo-function:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8099/health"]
      interval: 5s
      timeout: 3s
      retries: 10
